{% extends "base.html" %}
{% block content %}

<h2>Recruiter Panel</h2>

<table>
<tr>
<th>ID</th>
<th>User</th>
<th>Skills</th>
<th>Applied</th>
<th>Status</th>
<th>Action</th>
</tr>

{% for row in data %}
<tr>
<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[4]}}</td>
<td>{{row[6]}}</td>
<td>{{row[7]}}</td>
<td>
<a href="/update/{{row[0]}}/Selected">Select</a> |
<a href="/update/{{row[0]}}/Rejected">Reject</a>
</td>
</tr>
{% endfor %}

</table>

{% endblock %}
