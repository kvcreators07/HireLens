{% extends "base.html" %}

{% block content %}

<h1>📊 User Data Table</h1>

<table border="1" style="width:100%; color:white;">
    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Filename</th>
        <th>Score</th>
        <th>Skills</th>
        <th>Jobs</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
        <td>{{ row[4] }}</td>
        <td>{{ row[5] }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
