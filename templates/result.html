{% extends "base.html" %}
{% block content %}

<div class="card">
    <h2>📊 Resume Analysis</h2>

    <h3>ATS Score: {{score}}</h3>

    <p><b>Skills:</b> {{skills}}</p>

    <h3>Recommended Jobs</h3>

    {% for job in jobs %}
        <p>{{job}} <a href="/apply/{{job}}">Apply</a></p>
    {% endfor %}
</div>

{% endblock %}
